{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="bg">
    <h2 class="pt-10 text-center font-bold text-3xl">Customer Churn Prediction update</h2>
    <div class="border-2 border-blue-400 rounded-lg p-6 w-212.5 mx-auto mt-6 bg-white shadow-md">
        <form method="post" action="/predict/" class="grid grid-cols-2 gap-x-8 gap-y-4 ">
            {% csrf_token %}

            <!-- Phone Service & Related -->
            <div id="phone_service_group">
                <label for="phone_service" class="font-medium text-gray-700 mb-1 block">
                    Has the customer subscribed to the telecom company's phone service?
                </label>
                <select name="phone_service" id="phone_service"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                </select>
            </div>

            <div id="multiple_lines_group">
                <label for="multiple_lines" class="font-medium text-gray-700 mb-1 block">
                    Whether a customer has more than one telephone line?
                </label>
                <select name="multiple_lines" id="multiple_lines"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No phone service">
                        No phone service </option>
                </select>
            </div>

            <!-- Internet Service & Related -->
            <div id="internet_service_group">
                <label for="internet_service" class="font-medium text-gray-700 mb-1 block">
                    what type of internet connection the customer has
                </label>
                <select name="internet_service" id="internet_service"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="DSL">DSL</option>
                    <option value="Fiber optic">Fiber optic</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div id="online_security_group">
                <label for="online_security" class="font-medium text-gray-700 mb-1 block">Whether the customer has an
                    internet
                    security service (e.g., antivirus/firewall) provided by the telecom company?</label>
                <select name="online_security" id="online_security"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No internet service">
                        No internet service </option>
                </select>
            </div>

            <div id="online_backup_group">
                <label for="online_backup" class="font-medium text-gray-700 mb-1 block">Whether the customer has an
                    online/cloud
                    backup service for their files.</label>
                <select name="online_backup" id="online_backup"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No internet service">
                        No internet service </option>
                </select>
            </div>

            <div id="device_protection_group">
                <label for="device_protection" class="font-medium text-gray-700 mb-1 block">Whether the customer has
                    device
                    protection or extended warranty for their devices.</label>
                <select name="device_protection" id="device_protection"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No internet service">
                        No internet service </option>
                </select>
            </div>

            <div id="tech_support_group">
                <label for="tech_support" class="font-medium text-gray-700 mb-1 block">Whether the customer subscribes
                    to
                    technical support services.</label>
                <select name="tech_support" id="tech_support"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No internet service">
                        No internet service </option>
                </select>
            </div>

            <div id="streaming_t_v_group">
                <label for="streaming_t_v" class="font-medium text-gray-700 mb-1 block">Whether the customer has a TV
                    streaming
                    service from the provider.</label>
                <select name="streaming_t_v" id="streaming_t_v"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No internet service">
                        No internet service </option>
                </select>
            </div>

            <div id="streaming_movies_group">
                <label for="streaming_movies" class="font-medium text-gray-700 mb-1 block">Whether the customer has a
                    Movie
                    streaming service from the provider.</label>
                <select name="streaming_movies" id="streaming_movies"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                    <option value="No internet service">
                        No internet service </option>
                </select>
            </div>

            <!-- Demographic / Personal Info -->
            <div id="gender_group">
                <label for="gender" class="font-medium text-gray-700 mb-1 block">Gender</label>
                <select name="gender" id="gender"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="male">
                        male
                    </option>
                    <option value="female">female</option>
                </select>
            </div>

            <div id="senior_citizen_group">
                <label for="senior_citizen" class="font-medium text-gray-700 mb-1 block">Senior Citizen</label>
                <select name="senior_citizen" id="senior_citizen"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                </select>
            </div>

            <div id="partner_group">
                <label for="partner" class="font-medium text-gray-700 mb-1 block">Do you have a partner?</label>
                <select name="partner" id="partner"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                </select>
            </div>

            <div id="dependents_group">
                <label for="dependents" class="font-medium text-gray-700 mb-1 block">Whether customer has someone who
                    relies financially on him/her?</label>
                <select name="dependents" id="dependents"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                </select>
            </div>

            <!-- Billing, Charges & Contract -->
            <div id="tenure_group">
                <label for="tenure" class="font-medium text-gray-700 mb-1 block">How long the customer had been using
                    our
                    Services?(in months)</label>
                <input placeholder="Enter months" required type="number" id="tenure" name="tenure" min="0" max="120"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div id="contract_group">
                <label for="contract" class="font-medium text-gray-700 mb-1 block">Type of Contract the customer
                    has</label>
                <select name="contract" id="contract"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="Two year ">Two year</option>
                    <option value="One year">One year</option>
                </select>
            </div>

            <div id="paperless_billling_group">
                <label for="paperless_billing" class="font-medium text-gray-700 mb-1 block">Paperless Billing</label>
                <select name="paperless_billing" id="paperless_billing"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="yes">
                        Yes
                    </option>
                    <option value="no">No</option>
                </select>
            </div>

            <div id="payment_method_group">
                <label for="payment_method" class="font-medium text-gray-700 mb-1 block">
                    Payment Method
                </label>
                <select name="payment_method" id="payment_method"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="Electronic check">Electronic check</option>
                    <option value="Mailed check">Mailed check</option>
                    <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                    <option value="Credit card (automatic)">Credit card (automatic)</option>
                </select>
            </div>

            <div id="mothly_charges_group">
                <label for="monthly_charges" class="font-medium text-gray-700 mb-1 block">The amount the customer pays
                    every month (in dollars)</label>
                <input id="monthly_charges" name="monthly_charges" type="number"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div id="total_charges_group">
                <label for="total_charges" class="font-medium text-gray-700 mb-1 block">The total amount the customer
                    has paid since joining the company.</label>
                <input id="total_charges" name="total_charges" type="number"
                    class="border border-gray-300 rounded-md px-3 py-2 w-full h-10 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div class="col-span-2 flex justify-center mt-6">
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-md inline-block w-fit">
                    Predict Churn
                </button>
            </div>


        </form>

    </div>

    <script>
        // ---------------- Phone Service ----------------

        const phone_service = document.getElementById("phone_service");
        const multiple_lines = document.getElementById("multiple_lines");
        const multiple_lines_group = document.getElementById("multiple_lines_group");

        function updatePhoneService() {

            if (phone_service.value === "no") {
                multiple_lines.value = "No phone service";
                multiple_lines_group.style.display = "none";
            } else {
                multiple_lines_group.style.display = "block";
                multiple_lines.value = "no";//reset
            }

        }

        phone_service.addEventListener("change", updatePhoneService);

        // ---------------- Internet Service ----------------

        const internet_service = document.getElementById("internet_service");

        const internetFields = [
            "online_security",
            "online_backup",
            "device_protection",
            "tech_support",
            "streaming_t_v",
            "streaming_movies"
        ];

        function updateInternetService() {

            if (internet_service.value === "No") {

                internetFields.forEach(function (field) {

                    document.getElementById(field).value = "No internet service";
                    document.getElementById(field + "_group").style.display = "none";

                });

            } else {

                internetFields.forEach(function (field) {

                    document.getElementById(field + "_group").style.display = "block";
                    document.getElementById(field).value = "no";

                });

            }

        }

        internet_service.addEventListener("change", updateInternetService);

        // Run once when page loads
        updatePhoneService();
        updateInternetService();

    </script>
</body>

</html>
