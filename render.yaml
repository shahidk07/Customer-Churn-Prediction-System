services:
  - type: web
    name: customer-churn-prediction-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn --chdir churn_project churn_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
